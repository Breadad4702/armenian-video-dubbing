# All workflows are currently disabled to prevent GitHub Actions charges.
# To re-enable, uncomment the 'on:' trigger below and remove the 'on: workflow_dispatch'.
# ============================================================================

name: CI

# DISABLED: uncomment the block below to re-enable automatic triggers
# on:
#   push:
#     branches: [main, develop]
#   pull_request:
#     branches: [main]

# Manual trigger only (prevents automatic charges)
on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: armtts

jobs:
  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/ scripts/ tests/

  # -----------------------------------------------------------------------
  # Test
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 rubberband-cli

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy soundfile librosa pyyaml loguru torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers peft jiwer edge-tts

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  # -----------------------------------------------------------------------
  # Docker Build
  # -----------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

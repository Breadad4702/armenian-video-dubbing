# ============================================================================
# Armenian Video Dubbing AI — Docker Compose (Production)
# ============================================================================
# Usage:
#   docker compose up -d             # Start all services
#   docker compose up gradio         # Start only Gradio UI
#   docker compose up api            # Start only FastAPI
#   docker compose --profile dev up  # Include Label Studio
#   docker compose logs -f           # Follow logs
# ============================================================================

services:
  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: armtts-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gradio
      - api
    restart: unless-stopped

  # --- Gradio Web UI ---
  gradio:
    build:
      context: .
      dockerfile: Dockerfile
    image: armtts:latest
    container_name: armtts-gradio
    command: ["python", "-m", "src.ui.gradio_app", "--port", "7860"]
    ports:
      - "7860:7860"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - ARMTTS_CONFIG=/app/configs/config.yaml
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- FastAPI Backend ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: armtts:latest
    container_name: armtts-api
    command: >
      python -m uvicorn src.api.fastapi_server:create_app
      --factory --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - ARMTTS_CONFIG=/app/configs/config.yaml
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Label Studio (dev profile only) ---
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: armtts-label-studio
    profiles:
      - dev
    ports:
      - "8080:8080"
    volumes:
      - ./data/label_studio:/label-studio/data
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data
    restart: unless-stopped
